services:
  - type: web
    name: kistie-store
    runtime: python
    plan: free
    healthCheckPath: /health/
    buildCommand: pip install -r requirements.txt && python backend/manage.py collectstatic --noinput
    startCommand: python backend/manage.py migrate && python backend/manage.py seed_inventory_if_empty && gunicorn --chdir backend core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ENABLE_ADMIN
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com localhost 127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: kistie-store-db
          property: connectionString
      - key: DJANGO_EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: CONTACT_RECIPIENT_EMAIL
        value: "dallas8000@gmail.com"
      - key: DJANGO_DEFAULT_FROM_EMAIL
        value: "dallas8000@gmail.com"

databases:
  - name: kristie-store-db
    databaseName: kristie_store
    user: kristie_store_user
